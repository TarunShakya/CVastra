<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="100%" stop-color="#ff2d78" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-gradient)" />
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="#2a3348" stroke-width="2" />

  <!-- "C" -->
  <path
    d="M 210 165
       A 100 100 0 1 0 210 347"
    fill="none"
    stroke="#e6edf3"
    stroke-width="34"
    stroke-linecap="round"
  />

  <!-- "V" (rendered as accent gradient, overlapping the C to form a lockup) -->
  <path
    d="M 232 176 L 278 300 L 324 176"
    fill="none"
    stroke="url(#accent-gradient)"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Spark accent, top-right, echoing the star used elsewhere in the product -->
  <path
    d="M372 118 L379 138 L399 145 L379 152 L372 172 L365 152 L345 145 L365 138 Z"
    fill="url(#accent-gradient)"
  />
</svg>
